<!-- GitHubм—җ м ҖмһҘлҗң ліөк¶Ң кө¬л§ӨлІҲнҳё YAMLмқ„ н‘ңмӢңн•ҳкі  кІҖмӮ¬ мӣҢнҒ¬н”ҢлЎңлҘј мӢӨн–үн•ҳлҠ” м •м Ғ нҺҳмқҙм§Җ -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DHLottery кө¬л§ӨлІҲнҳё</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --surface: #ffffff;
      --control: #ffffff;
      --soft: #eef3f8;
      --text: #182230;
      --muted: #667085;
      --line: #d7dee8;
      --primary: #1261a6;
      --primary-text: #ffffff;
      --good: #157a51;
      --bad: #b42318;
      --yaml-bg: #101828;
      --yaml-text: #e8eef8;
      --shadow: 0 10px 26px rgba(24, 34, 48, 0.07);
      --ball-yellow: #f2b705;
      --ball-blue: #3578d4;
      --ball-red: #d94a38;
      --ball-gray: #667085;
      --ball-green: #2c9b60;
    }

    body.theme-dark {
      color-scheme: dark;
      --bg: #111418;
      --surface: #1a2027;
      --control: #222a33;
      --soft: #27313c;
      --text: #eef3f8;
      --muted: #aab6c4;
      --line: #3a4654;
      --primary: #2d7fd3;
      --primary-text: #ffffff;
      --good: #67d79d;
      --bad: #ff9188;
      --yaml-bg: #0b1118;
      --yaml-text: #dce8f5;
      --shadow: 0 10px 26px rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .topbar,
    .panel-header,
    .actions,
    .inline-toggle,
    .stat-row,
    .ticket-row {
      display: flex;
      align-items: center;
    }

    .topbar {
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .top-actions,
    .actions {
      gap: 8px;
      flex-wrap: wrap;
    }

    .top-actions {
      display: flex;
      justify-content: flex-end;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    h2 {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .badge-mark {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--good);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 0.74fr) minmax(380px, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .panel-body {
      display: grid;
      gap: 16px;
      padding: 18px;
    }

    .stat-list {
      display: grid;
      gap: 8px;
    }

    .stat-row {
      justify-content: space-between;
      gap: 12px;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .stat-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .stat-value {
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      text-align: right;
    }

    .command {
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow-x: auto;
      background: var(--soft);
      color: var(--text);
      font-family: Consolas, "SFMono-Regular", Menlo, monospace;
      font-size: 14px;
      white-space: pre;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: var(--control);
      color: var(--text);
      font: inherit;
      letter-spacing: 0;
    }

    input:focus,
    select:focus,
    button:focus-visible {
      outline: 3px solid rgba(18, 97, 166, 0.18);
      border-color: var(--primary);
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 13px;
      background: var(--control);
      color: var(--text);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: var(--primary-text);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .inline-toggle {
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .inline-toggle input {
      width: 18px;
      height: 18px;
      margin: 0;
    }

    .schedule-card {
      display: grid;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .setting-title {
      color: var(--text);
      font-size: 14px;
      font-weight: 900;
    }

    .schedule-grid {
      display: grid;
      grid-template-columns: minmax(96px, 0.8fr) minmax(110px, 1fr) minmax(110px, 1fr);
      gap: 8px;
      align-items: end;
    }

    .external-link {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }

    .status {
      min-height: 24px;
      font-size: 14px;
      color: var(--muted);
    }

    .status.good {
      color: var(--good);
    }

    .status.bad {
      color: var(--bad);
    }

    .balls {
      display: grid;
      grid-template-columns: repeat(6, 40px);
      gap: 7px;
      justify-content: end;
    }

    .ball {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: #ffffff;
      font-weight: 900;
      box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.14);
    }

    .ball.empty {
      color: var(--muted);
      background: var(--soft);
      box-shadow: none;
    }

    .ticket-summary {
      display: grid;
      gap: 8px;
    }

    .ticket-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
    }

    .ticket-slot {
      display: grid;
      place-items: center;
      min-width: 34px;
      height: 30px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--primary);
    }

    .yaml {
      min-height: 330px;
      margin: 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
      background: var(--yaml-bg);
      color: var(--yaml-text);
      font-family: Consolas, "SFMono-Regular", Menlo, monospace;
      font-size: 14px;
      white-space: pre;
    }

    @media (max-width: 860px) {
      main {
        width: min(100% - 20px, 720px);
        padding: 18px 0;
      }

      .topbar,
      .panel-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-actions,
      .balls {
        justify-content: start;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .schedule-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 440px) {
      .actions button,
      .external-link {
        width: 100%;
        justify-content: center;
      }

      .balls {
        grid-template-columns: repeat(3, 40px);
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">

            <a class="external-link" href="https://github.com/asher8554/DHLottery/actions/workflows/check-results.yml" target="_blank" rel="noreferrer">Actions ліҙкё°</a>

  <script>
    const ticketsRawUrl = "https://raw.githubusercontent.com/asher8554/DHLottery/main/data/tickets.yml";
    const accountRawUrl = "https://raw.githubusercontent.com/asher8554/DHLottery/main/data/account.yml";
    const notificationSettingsRawUrl = "https://raw.githubusercontent.com/asher8554/DHLottery/main/data/notification-settings.yml";
    const notificationSettingsContentsUrl = "https://api.github.com/repos/asher8554/DHLottery/contents/data/notification-settings.yml";
    const checkWorkflowDispatchUrl = "https://api.github.com/repos/asher8554/DHLottery/actions/workflows/check-results.yml/dispatches";
    const balanceAlertThreshold = 50000;
    const tokenStorageKey = "dhlottery.githubToken";
    const themeStorageKey = "dhlottery.theme";
    const ballColors = ["#f2b705", "#3578d4", "#d94a38", "#667085", "#2c9b60"];

    const themeToggle = document.querySelector("#themeToggle");
    const balanceAmount = document.querySelector("#balanceAmount");
    const balanceStatus = document.querySelector("#balanceStatus");
    const balanceUpdatedAt = document.querySelector("#balanceUpdatedAt");
    const notificationScheduleSummary = document.querySelector("#notificationScheduleSummary");
    const loadedAt = document.querySelector("#loadedAt");
    const ticketCount = document.querySelector("#ticketCount");
    const ticketSummary = document.querySelector("#ticketSummary");
    const ballsEl = document.querySelector("#balls");
    const yamlOutput = document.querySelector("#yamlOutput");
    const statusEl = document.querySelector("#status");
    const reloadTickets = document.querySelector("#reloadTickets");
    const copyYaml = document.querySelector("#copyYaml");
    const downloadYaml = document.querySelector("#downloadYaml");
    const githubToken = document.querySelector("#githubToken");
    const rememberToken = document.querySelector("#rememberToken");
    const forceNotify = document.querySelector("#forceNotify");
    const lottoScheduleEnabled = document.querySelector("#lottoScheduleEnabled");
    const lottoScheduleDay = document.querySelector("#lottoScheduleDay");
    const lottoScheduleTime = document.querySelector("#lottoScheduleTime");
    const pensionScheduleEnabled = document.querySelector("#pensionScheduleEnabled");
    const pensionScheduleDay = document.querySelector("#pensionScheduleDay");
    const pensionScheduleTime = document.querySelector("#pensionScheduleTime");
    const scheduleWindowMinutes = document.querySelector("#scheduleWindowMinutes");
    const saveSchedule = document.querySelector("#saveSchedule");
    const runCheck = document.querySelector("#runCheck");
    const clearToken = document.querySelector("#clearToken");

    let currentYaml = "";
    let currentTickets = { lotto: [], pension: [] };

    function setStatus(message, tone) {
      statusEl.textContent = message;
      statusEl.className = `status ${tone || ""}`.trim();
    }

    function setButtonsEnabled(enabled) {
      copyYaml.disabled = !enabled;
      downloadYaml.disabled = !enabled;
      runCheck.disabled = !enabled;
    }

    function parseNumberList(value) {
      return (value.match(/\d+/g) || []).map((number) => Number(number));
    }

    function parseAccountYaml(yaml) {
      const amountMatch = yaml.match(/^\s*amount:\s*(\d+)\s*$/m);
      const updatedAtMatch = yaml.match(/^\s*updated_at:\s*["']?(.+?)["']?\s*$/m);
      return {
        amount: amountMatch ? Number(amountMatch[1]) : null,
        updatedAt: updatedAtMatch ? updatedAtMatch[1] : "",
      };
    }

    function formatKrw(amount) {
      return `${new Intl.NumberFormat("ko-KR").format(amount)}мӣҗ`;
    }

    function formatDateTime(value) {
      if (!value) {
        return "-";
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return date.toLocaleString("ko-KR");
    }

    function defaultNotificationSettings() {
      return {
        timezone: "Asia/Seoul",
        windowMinutes: 30,
        lotto: { enabled: true, day: "saturday", time: "21:45" },
        pension: { enabled: true, day: "thursday", time: "20:10" },
      };
    }

    function cleanYamlValue(value) {
      return String(value || "").trim().replace(/^["']|["']$/g, "");
    }

    function parseNotificationSettingsYaml(yaml) {
      const settings = defaultNotificationSettings();
      let section = "";

      for (const line of yaml.split(/\r?\n/)) {
        const trimmed = line.trim();
        if (!trimmed || trimmed === "notification_schedule:") {
          continue;
        }

        const topMatch = line.match(/^  (lotto|pension):\s*$/);
        if (topMatch) {
          section = topMatch[1];
          continue;
        }

        const timezoneMatch = line.match(/^  timezone:\s*(.+?)\s*$/);
        if (timezoneMatch) {
          settings.timezone = cleanYamlValue(timezoneMatch[1]) || settings.timezone;
          continue;
        }

        const windowMatch = line.match(/^  window_minutes:\s*(\d+)\s*$/);
        if (windowMatch) {
          settings.windowMinutes = Number(windowMatch[1]);
          continue;
        }

        if (!section) {
          continue;
        }

        const enabledMatch = line.match(/^    enabled:\s*(true|false)\s*$/i);
        if (enabledMatch) {
          settings[section].enabled = enabledMatch[1].toLowerCase() === "true";
          continue;
        }

        const dayMatch = line.match(/^    day:\s*(.+?)\s*$/);
        if (dayMatch) {
          settings[section].day = cleanYamlValue(dayMatch[1]);
          continue;
        }

        const timeMatch = line.match(/^    time:\s*(.+?)\s*$/);
        if (timeMatch) {
          settings[section].time = cleanYamlValue(timeMatch[1]);
        }
      }

      return settings;
    }

    function notificationSettingsToYaml(settings) {
      return [
        "notification_schedule:",
        `  timezone: ${settings.timezone || "Asia/Seoul"}`,
        `  window_minutes: ${settings.windowMinutes}`,
        "  lotto:",
        `    enabled: ${settings.lotto.enabled ? "true" : "false"}`,
        `    day: ${settings.lotto.day}`,
        `    time: "${settings.lotto.time}"`,
        "  pension:",
        `    enabled: ${settings.pension.enabled ? "true" : "false"}`,
        `    day: ${settings.pension.day}`,
        `    time: "${settings.pension.time}"`,
        "",
      ].join("\n");
    }

    function scheduleSummary(settings) {
      const dayLabels = {
        monday: "мӣ”",
        tuesday: "нҷ”",
        wednesday: "мҲҳ",
        thursday: "лӘ©",
        friday: "кёҲ",
        saturday: "нҶ ",
        sunday: "мқј",
      };
      const parts = [];
      if (settings.lotto.enabled) {
        parts.push(`лЎңлҳҗ ${dayLabels[settings.lotto.day] || settings.lotto.day} ${settings.lotto.time}`);
      }
      if (settings.pension.enabled) {
        parts.push(`м—°кёҲ ${dayLabels[settings.pension.day] || settings.pension.day} ${settings.pension.time}`);
      }
      return parts.length ? `${parts.join(", ")} В· ${settings.windowMinutes}л¶„` : "кәјм§җ";
    }

    function renderNotificationSettings(settings) {
      lottoScheduleEnabled.checked = settings.lotto.enabled;
      lottoScheduleDay.value = settings.lotto.day;
      lottoScheduleTime.value = settings.lotto.time;
      pensionScheduleEnabled.checked = settings.pension.enabled;
      pensionScheduleDay.value = settings.pension.day;
      pensionScheduleTime.value = settings.pension.time;
      scheduleWindowMinutes.value = settings.windowMinutes;
      notificationScheduleSummary.textContent = scheduleSummary(settings);
    }

    function readNotificationSettingsForm() {
      const windowMinutes = Number(scheduleWindowMinutes.value);
      if (!Number.isInteger(windowMinutes) || windowMinutes < 1 || windowMinutes > 360) {
        throw new Error("нҷ•мқё н—Ҳмҡ© мӢңк°„мқҖ 1л¶Җн„° 360 мӮ¬мқҙм—¬м•ј н•©лӢҲлӢӨ.");
      }
      if (!lottoScheduleTime.value || !pensionScheduleTime.value) {
        throw new Error("м•ҢлҰј мӢңк°„мқ„ мһ…л Ҙн•ҳм„ёмҡ”.");
      }
      return {
        timezone: "Asia/Seoul",
        windowMinutes,
        lotto: {
          enabled: lottoScheduleEnabled.checked,
          day: lottoScheduleDay.value,
          time: lottoScheduleTime.value,
        },
        pension: {
          enabled: pensionScheduleEnabled.checked,
          day: pensionScheduleDay.value,
          time: pensionScheduleTime.value,
        },
      };
    }

    function parseTicketsYaml(yaml) {
      const lotto = [];
      const pension = [];
      let section = "";
      let current = null;

      for (const line of yaml.split(/\r?\n/)) {
        const trimmed = line.trim();
        if (!trimmed || trimmed === "tickets:") {
          continue;
        }
        if (trimmed === "lotto:") {
          section = "lotto";
          current = null;
          continue;
        }
        if (trimmed === "pension:") {
          section = "pension";
          current = null;
          continue;
        }

        const labelMatch = trimmed.match(/^- label:\s*["']?(.+?)["']?\s*$/);
        if (labelMatch && section) {
          current = { label: labelMatch[1] };
          if (section === "lotto") {
            current.numbers = [];
            lotto.push(current);
          } else {
            pension.push(current);
          }
          continue;
        }

        if (!current) {
          continue;
        }

        const roundMatch = trimmed.match(/^round:\s*(\d+)/);
        if (roundMatch) {
          current.round = Number(roundMatch[1]);
          continue;
        }

        const numbersInlineMatch = trimmed.match(/^numbers:\s*\[(.*?)\]/);
        if (numbersInlineMatch) {
          current.numbers = parseNumberList(numbersInlineMatch[1]).slice(0, 6);
          continue;
        }

        if (section === "lotto" && /^-\s*\d+/.test(trimmed)) {
          current.numbers.push(Number(trimmed.replace(/^-\s*/, "")));
          current.numbers = current.numbers.slice(0, 6);
          continue;
        }

        const groupMatch = trimmed.match(/^group:\s*(\d+)/);
        if (groupMatch) {
          current.group = Number(groupMatch[1]);
          continue;
        }

        const pensionNumberMatch = trimmed.match(/^number:\s*["']?(\d{6})["']?/);
        if (pensionNumberMatch) {
          current.number = pensionNumberMatch[1];
        }
      }

      return {
        lotto: lotto.filter((ticket) => ticket.round && ticket.numbers.length === 6),
        pension: pension.filter((ticket) => ticket.round && ticket.group && /^\d{6}$/.test(ticket.number || "")),
      };
    }

    function slotFromLabel(label, fallback) {
      const match = String(label || "").match(/нҡҢ\s+([A-Z0-9]+)$/);
      return match ? match[1] : String(fallback);
    }

    function renderBalls(numbers) {
      ballsEl.innerHTML = "";
      for (let index = 0; index < 6; index += 1) {
        const value = numbers[index];
        const ball = document.createElement("span");
        ball.className = value ? "ball" : "ball empty";
        ball.textContent = value || "-";
        if (value) {
          ball.style.background = ballColors[Math.min(Math.floor((value - 1) / 10), ballColors.length - 1)];
        }
        ballsEl.appendChild(ball);
      }
    }

    function appendTicketRow(slotText, numberText) {
      const row = document.createElement("div");
      row.className = "ticket-row";

      const slot = document.createElement("span");
      slot.className = "ticket-slot";
      slot.textContent = slotText;

      const numbers = document.createElement("span");
      numbers.textContent = numberText;

      row.appendChild(slot);
      row.appendChild(numbers);
      ticketSummary.appendChild(row);
    }

    function renderTickets(tickets) {
      ticketSummary.innerHTML = "";
      tickets.lotto.forEach((ticket, index) => {
        appendTicketRow(`лЎңлҳҗ ${slotFromLabel(ticket.label, index + 1)}`, ticket.numbers.join("  "));
      });
      tickets.pension.forEach((ticket, index) => {
        const slot = slotFromLabel(ticket.label, index + 1);
        appendTicketRow(`м—°кёҲ ${slot}`, `${ticket.round}нҡҢ ${ticket.group}мЎ° ${ticket.number}`);
      });
      renderBalls(tickets.lotto[0]?.numbers || []);
    }

    function renderEmpty(message) {
      currentYaml = "";
      currentTickets = { lotto: [], pension: [] };
      yamlOutput.textContent = "";
      ticketSummary.innerHTML = "";
      ticketCount.textContent = "0к°ң";
      renderBalls([]);
      setButtonsEnabled(false);
      setStatus(message, "");
    }

    async function loadTickets() {
      reloadTickets.disabled = true;
      setStatus("м ҖмһҘлҗң кө¬л§ӨлІҲнҳёлҘј л¶Ҳлҹ¬мҳӨлҠ” мӨ‘мһ…лӢҲлӢӨ.", "");
      try {
        const response = await fetch(`${ticketsRawUrl}?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }

        const yaml = await response.text();
        loadedAt.textContent = new Date().toLocaleString("ko-KR");
        if (!yaml.trim()) {
          renderEmpty("м ҖмһҘлҗң кө¬л§ӨлІҲнҳёк°Җ м—ҶмҠөлӢҲлӢӨ.");
          return;
        }

        const tickets = parseTicketsYaml(yaml);
        const totalCount = tickets.lotto.length + tickets.pension.length;
        currentYaml = yaml.trimEnd() + "\n";
        currentTickets = tickets;
        yamlOutput.textContent = currentYaml;
        ticketCount.textContent = `лЎңлҳҗ ${tickets.lotto.length}к°ң, м—°кёҲліөк¶Ң ${tickets.pension.length}к°ң`;
        renderTickets(tickets);
        setButtonsEnabled(totalCount > 0);
        setStatus(totalCount > 0 ? `${totalCount}к°ң кө¬л§ӨлІҲнҳёлҘј л¶Ҳлҹ¬мҷ”мҠөлӢҲлӢӨ.` : "кө¬л§ӨлІҲнҳё нҳ•мӢқмқ„ нҷ•мқён•ҳм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.", totalCount > 0 ? "good" : "bad");
      } catch (error) {
        renderEmpty("кө¬л§ӨлІҲнҳёлҘј л¶Ҳлҹ¬мҳӨм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.");
        setStatus(`кө¬л§ӨлІҲнҳё лЎңл“ң мӢӨнҢЁ. ${error.message}`, "bad");
      } finally {
        reloadTickets.disabled = false;
      }
    }

    async function loadAccount() {
      try {
        const response = await fetch(`${accountRawUrl}?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }

        const account = parseAccountYaml(await response.text());
        if (account.amount === null) {
          throw new Error("мҳҲм№ҳкёҲ нҳ•мӢқмқ„ нҷ•мқён•ҳм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.");
        }
        const isLowBalance = account.amount <= balanceAlertThreshold;
        balanceAmount.textContent = formatKrw(account.amount);
        balanceStatus.textContent = isLowBalance ? "м¶©м „ н•„мҡ”" : "м •мғҒ";
        balanceStatus.style.color = isLowBalance ? "var(--bad)" : "var(--good)";
        balanceUpdatedAt.textContent = formatDateTime(account.updatedAt);
      } catch {
        balanceAmount.textContent = "лҸҷкё°нҷ” м „";
        balanceStatus.textContent = "-";
        balanceStatus.style.color = "";
        balanceUpdatedAt.textContent = "-";
      }
    }

    async function loadNotificationSettings() {
      try {
        const response = await fetch(`${notificationSettingsRawUrl}?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }
        renderNotificationSettings(parseNotificationSettingsYaml(await response.text()));
      } catch {
        renderNotificationSettings(defaultNotificationSettings());
      }
    }

    async function loadDashboard() {
      await Promise.all([loadTickets(), loadAccount(), loadNotificationSettings()]);
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const helper = document.createElement("textarea");
      helper.value = text;
      helper.setAttribute("readonly", "");
      helper.style.position = "fixed";
      helper.style.opacity = "0";
      document.body.appendChild(helper);
      helper.select();
      document.execCommand("copy");
      helper.remove();
    }

    async function handleCopy() {
      if (!currentYaml.trim()) {
        return;
      }
      try {
        await copyText(currentYaml);
        setStatus("YAMLмқ„ ліөмӮ¬н–ҲмҠөлӢҲлӢӨ.", "good");
      } catch {
        setStatus("ліөмӮ¬м—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ.", "bad");
      }
    }

    function handleDownload() {
      if (!currentYaml.trim()) {
        return;
      }
      const blob = new Blob([currentYaml], { type: "text/yaml;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "tickets.yml";
      document.body.appendChild(link);
      link.click();
      URL.revokeObjectURL(link.href);
      link.remove();
      setStatus("tickets.yml нҢҢмқјмқ„ л§Ңл“Өм—ҲмҠөлӢҲлӢӨ.", "good");
    }

    function loadSavedToken() {
      try {
        const savedToken = localStorage.getItem(tokenStorageKey);
        if (savedToken) {
          githubToken.value = savedToken;
          rememberToken.checked = true;
        }
      } catch {
        clearToken.disabled = true;
      }
    }

    function saveTokenPreference() {
      try {
        if (rememberToken.checked && githubToken.value.trim()) {
          localStorage.setItem(tokenStorageKey, githubToken.value.trim());
        } else {
          localStorage.removeItem(tokenStorageKey);
        }
      } catch {
        setStatus("лёҢлқјмҡ°м Җ м ҖмһҘмҶҢм—җ нҶ нҒ°мқ„ м ҖмһҘн•ҳм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.", "bad");
      }
    }

    function clearSavedToken() {
      try {
        localStorage.removeItem(tokenStorageKey);
      } catch {
        setStatus("лёҢлқјмҡ°м Җ м ҖмһҘмҶҢм—җ м ‘к·јн•ҳм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.", "bad");
        return;
      }
      githubToken.value = "";
      rememberToken.checked = false;
      setStatus("м ҖмһҘлҗң нҶ нҒ°мқ„ м§Җмӣ мҠөлӢҲлӢӨ.", "good");
    }

    function utf8ToBase64(text) {
      const bytes = new TextEncoder().encode(text);
      let binary = "";
      for (const byte of bytes) {
        binary += String.fromCharCode(byte);
      }
      return btoa(binary);
    }

    async function fetchNotificationSettingsSha(token) {
      const response = await fetch(`${notificationSettingsContentsUrl}?ref=main`, {
        headers: {
          "Accept": "application/vnd.github+json",
          "Authorization": `Bearer ${token}`,
          "X-GitHub-Api-Version": "2022-11-28",
        },
      });
      if (response.status === 404) {
        return "";
      }
      if (!response.ok) {
        const detail = await response.text();
        throw new Error(`${response.status} ${detail}`);
      }
      const payload = await response.json();
      return payload.sha || "";
    }

    async function handleSaveSchedule() {
      const token = githubToken.value.trim();
      if (!token) {
        setStatus("GitHub tokenмқ„ мһ…л Ҙн•ҳм„ёмҡ”.", "bad");
        return;
      }

      let settings;
      try {
        settings = readNotificationSettingsForm();
      } catch (error) {
        setStatus(error.message, "bad");
        return;
      }

      saveTokenPreference();
      saveSchedule.disabled = true;
      setStatus("м•ҢлҰј мӢңк°„ м„Өм •мқ„ м ҖмһҘн•ҳлҠ” мӨ‘мһ…лӢҲлӢӨ.", "");
      try {
        const yaml = notificationSettingsToYaml(settings);
        const sha = await fetchNotificationSettingsSha(token);
        const body = {
          message: "м№ҙм№ҙмҳӨ м•ҢлҰј мӢңк°„ м„Өм • м—…лҚ°мқҙнҠё",
          content: utf8ToBase64(yaml),
          branch: "main",
        };
        if (sha) {
          body.sha = sha;
        }

        const response = await fetch(notificationSettingsContentsUrl, {
          method: "PUT",
          headers: {
            "Accept": "application/vnd.github+json",
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json",
            "X-GitHub-Api-Version": "2022-11-28",
          },
          body: JSON.stringify(body),
        });

        if (response.ok) {
          renderNotificationSettings(settings);
          setStatus("м•ҢлҰј мӢңк°„ м„Өм •мқ„ м ҖмһҘн–ҲмҠөлӢҲлӢӨ.", "good");
          return;
        }

        const detail = await response.text();
        const hint = response.status === 403 ? " Contents: Read and write к¶Ңн•ңмқ„ нҷ•мқён•ҳм„ёмҡ”." : "";
        setStatus(`м•ҢлҰј мӢңк°„ м ҖмһҘ мӢӨнҢЁ. ${response.status} ${detail}${hint}`, "bad");
      } catch (error) {
        setStatus(`м•ҢлҰј мӢңк°„ м ҖмһҘ мӢӨнҢЁ. ${error.message}`, "bad");
      } finally {
        saveSchedule.disabled = false;
      }
    }

    async function handleRunCheck() {
      const token = githubToken.value.trim();
      if (!token) {
        setStatus("GitHub tokenмқ„ мһ…л Ҙн•ҳм„ёмҡ”.", "bad");
        return;
      }
      saveTokenPreference();
      runCheck.disabled = true;
      setStatus("GitHub Actions мӢӨн–үмқ„ мҡ”мІӯн•ҳлҠ” мӨ‘мһ…лӢҲлӢӨ.", "");
      try {
        const response = await fetch(checkWorkflowDispatchUrl, {
          method: "POST",
          headers: {
            "Accept": "application/vnd.github+json",
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json",
            "X-GitHub-Api-Version": "2022-11-28",
          },
          body: JSON.stringify({
            ref: "main",
            inputs: {
              force_notify: forceNotify.checked ? "true" : "false",
            },
          }),
        });

        if (response.ok) {
          setStatus("лӢ№мІЁ кІҖмӮ¬ мӣҢнҒ¬н”ҢлЎңлҘј мӢӨн–үн–ҲмҠөлӢҲлӢӨ.", "good");
          return;
        }

        const detail = await response.text();
        setStatus(`GitHub мҡ”мІӯ мӢӨнҢЁ. ${response.status} ${detail}`, "bad");
      } catch (error) {
        setStatus(`GitHub мҡ”мІӯ мӢӨнҢЁ. ${error.message}`, "bad");
      } finally {
        runCheck.disabled = currentTickets.lotto.length + currentTickets.pension.length === 0;
      }
    }

    function applyTheme(theme) {
      const useDark = theme === "dark";
      document.body.classList.toggle("theme-dark", useDark);
      themeToggle.setAttribute("aria-pressed", String(useDark));
      themeToggle.textContent = useDark ? "лқјмқҙнҠёлӘЁл“ң" : "лӢӨнҒ¬лӘЁл“ң";
    }

    function loadTheme() {
      let savedTheme = "";
      try {
        savedTheme = localStorage.getItem(themeStorageKey) || "";
      } catch {
        savedTheme = "";
      }
      if (savedTheme) {
        applyTheme(savedTheme);
        return;
      }
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      applyTheme(prefersDark ? "dark" : "light");
    }

    function toggleTheme() {
      const nextTheme = document.body.classList.contains("theme-dark") ? "light" : "dark";
      applyTheme(nextTheme);
      try {
        localStorage.setItem(themeStorageKey, nextTheme);
      } catch {
        setStatus("лёҢлқјмҡ°м Җ м ҖмһҘмҶҢм—җ нҷ”л©ҙ лӘЁл“ңлҘј м ҖмһҘн•ҳм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.", "bad");
      }
    }

    reloadTickets.addEventListener("click", loadDashboard);
    copyYaml.addEventListener("click", handleCopy);
    downloadYaml.addEventListener("click", handleDownload);
    saveSchedule.addEventListener("click", handleSaveSchedule);
    runCheck.addEventListener("click", handleRunCheck);
    clearToken.addEventListener("click", clearSavedToken);
    rememberToken.addEventListener("change", saveTokenPreference);
    githubToken.addEventListener("input", () => {
      if (rememberToken.checked) {
        saveTokenPreference();
      }
    });
    themeToggle.addEventListener("click", toggleTheme);

    loadTheme();
    loadSavedToken();
    renderEmpty("м ҖмһҘлҗң кө¬л§ӨлІҲнҳёлҘј л¶Ҳлҹ¬мҳӨлҠ” мӨ‘мһ…лӢҲлӢӨ.");
    loadDashboard();
  </script>
</body>
