<!-- GitHub에 저장된 복권 구매번호 YAML을 표시하고 검사 워크플로를 실행하는 정적 페이지 -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DHLottery 구매번호</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --surface: #ffffff;
      --control: #ffffff;
      --soft: #eef3f8;
      --text: #182230;
      --muted: #667085;
      --line: #d7dee8;
      --primary: #1261a6;
      --primary-text: #ffffff;
      --good: #157a51;
      --bad: #b42318;
      --yaml-bg: #101828;
      --yaml-text: #e8eef8;
      --shadow: 0 10px 26px rgba(24, 34, 48, 0.07);
    }

    body.theme-dark {
      color-scheme: dark;
      --bg: #111418;
      --surface: #1a2027;
      --control: #222a33;
      --soft: #27313c;
      --text: #eef3f8;
      --muted: #aab6c4;
      --line: #3a4654;
      --primary: #2d7fd3;
      --primary-text: #ffffff;
      --good: #67d79d;
      --bad: #ff9188;
      --yaml-bg: #0b1118;
      --yaml-text: #dce8f5;
      --shadow: 0 10px 26px rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .topbar,
    .panel-header,
    .actions,
    .inline-toggle,
    .stat-row,
    .ticket-row {
      display: flex;
      align-items: center;
    }

    .topbar {
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .top-actions,
    .actions {
      gap: 8px;
      flex-wrap: wrap;
    }

    .top-actions {
      display: flex;
      justify-content: flex-end;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    h2 {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .badge-mark {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--good);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 0.74fr) minmax(380px, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .panel-body {
      display: grid;
      gap: 16px;
      padding: 18px;
    }

    .stat-list {
      display: grid;
      gap: 8px;
    }

    .stat-row {
      justify-content: space-between;
      gap: 12px;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .stat-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .stat-value {
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      text-align: right;
    }

    .command {
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow-x: auto;
      background: var(--soft);
      color: var(--text);
      font-family: Consolas, "SFMono-Regular", Menlo, monospace;
      font-size: 14px;
      white-space: pre;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: var(--control);
      color: var(--text);
      font: inherit;
      letter-spacing: 0;
    }

    input:focus,
    select:focus,
    button:focus-visible {
      outline: 3px solid rgba(18, 97, 166, 0.18);
      border-color: var(--primary);
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 13px;
      background: var(--control);
      color: var(--text);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: var(--primary-text);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .inline-toggle {
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .inline-toggle input {
      width: 18px;
      height: 18px;
      margin: 0;
    }

    .foldout {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
    }

    .foldout summary {
      min-height: 42px;
      padding: 10px 12px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
    }

    .foldout-body {
      display: grid;
      gap: 14px;
      padding: 0 12px 12px;
    }

    .schedule-card {
      display: grid;
      gap: 12px;
    }

    .schedule-grid {
      display: grid;
      grid-template-columns: minmax(96px, 0.8fr) minmax(110px, 1fr) minmax(110px, 1fr);
      gap: 8px;
      align-items: end;
    }

    .external-link {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }

    .status {
      min-height: 24px;
      font-size: 14px;
      color: var(--muted);
    }

    .status.good {
      color: var(--good);
    }

    .status.bad {
      color: var(--bad);
    }

    .ticket-summary {
      display: grid;
      gap: 8px;
    }

    .ticket-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
    }

    .ticket-slot {
      display: grid;
      place-items: center;
      min-width: 34px;
      height: 30px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--primary);
    }

    .yaml-details {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
    }

    .yaml-details summary {
      min-height: 42px;
      padding: 10px 12px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
    }

    .yaml {
      min-height: 330px;
      margin: 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
      background: var(--yaml-bg);
      color: var(--yaml-text);
      font-family: Consolas, "SFMono-Regular", Menlo, monospace;
      font-size: 14px;
      white-space: pre;
    }

    @media (max-width: 860px) {
      main {
        width: min(100% - 20px, 720px);
        padding: 18px 0;
      }

      .topbar,
      .panel-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-actions {
        justify-content: start;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .schedule-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 440px) {
      .actions button,
      .external-link {
        width: 100%;
        justify-content: center;
      }

    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <h1>복권 구매번호</h1>
      <div class="top-actions">
        <button type="button" id="themeToggle" aria-pressed="false">다크모드</button>
        <div class="badge" aria-label="data/tickets.yml 연동">
          <span class="badge-mark" aria-hidden="true"></span>
          data/tickets.yml 연동
        </div>
      </div>
    </div>

    <div class="workspace">
      <section class="panel" aria-labelledby="sync-title">
        <div class="panel-header">
          <h2 id="sync-title">동기화</h2>
        </div>
        <div class="panel-body">
          <div class="stat-list" aria-label="동기화 상태">
            <div class="stat-row">
              <span class="stat-label">저장 파일</span>
              <span class="stat-value">data/tickets.yml</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">예치금</span>
              <span class="stat-value" id="balanceAmount">-</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">예치금 상태</span>
              <span class="stat-value" id="balanceStatus">-</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">예치금 갱신</span>
              <span class="stat-value" id="balanceUpdatedAt">-</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">마지막 로드</span>
              <span class="stat-value" id="loadedAt">-</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">구매번호</span>
              <span class="stat-value" id="ticketCount">-</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">카카오 알림</span>
              <span class="stat-value" id="notificationScheduleSummary">-</span>
            </div>
          </div>

          <details class="foldout">
            <summary>로컬 스크래퍼 명령 보기</summary>
            <div class="foldout-body">
              <pre class="command">.\scripts\scrape-ledger-and-push.ps1 -ShowProgress</pre>
            </div>
          </details>

          <div class="actions">
            <button type="button" class="primary" id="reloadTickets">새로고침</button>
            <button type="button" id="copyYaml">YAML 복사</button>
            <button type="button" id="downloadYaml">tickets.yml 내려받기</button>
          </div>

          <details class="foldout">
            <summary>GitHub token 및 수동 실행</summary>
            <div class="foldout-body">
              <label>
                GitHub token
                <input id="githubToken" type="password" autocomplete="off" placeholder="github_pat_...">
              </label>
              <label class="inline-toggle">
                <input id="rememberToken" type="checkbox">
                이 브라우저에 토큰 저장
              </label>
              <label class="inline-toggle">
                <input id="forceNotify" type="checkbox">
                카카오톡 강제 재전송
              </label>
              <div class="actions">
                <button type="button" class="primary" id="runCheck">당첨 검사 실행</button>
                <button type="button" id="clearToken">저장된 토큰 지우기</button>
                <a class="external-link" href="https://github.com/asher8554/DHLottery/actions/workflows/check-results.yml" target="_blank" rel="noreferrer">Actions 보기</a>
              </div>
            </div>
          </details>

          <details class="foldout">
            <summary>카카오톡 알림 시간 설정</summary>
            <div class="foldout-body">
              <div class="schedule-card" aria-label="카카오톡 알림 시간">
                <div class="schedule-grid">
                  <label class="inline-toggle">
                    <input id="lottoScheduleEnabled" type="checkbox">
                    로또
                  </label>
                  <label>
                    요일
                    <select id="lottoScheduleDay">
                      <option value="monday">월요일</option>
                      <option value="tuesday">화요일</option>
                      <option value="wednesday">수요일</option>
                      <option value="thursday">목요일</option>
                      <option value="friday">금요일</option>
                      <option value="saturday">토요일</option>
                      <option value="sunday">일요일</option>
                    </select>
                  </label>
                  <label>
                    시간
                    <input id="lottoScheduleTime" type="time" step="60">
                  </label>
                </div>
                <div class="schedule-grid">
                  <label class="inline-toggle">
                    <input id="pensionScheduleEnabled" type="checkbox">
                    연금복권
                  </label>
                  <label>
                    요일
                    <select id="pensionScheduleDay">
                      <option value="monday">월요일</option>
                      <option value="tuesday">화요일</option>
                      <option value="wednesday">수요일</option>
                      <option value="thursday">목요일</option>
                      <option value="friday">금요일</option>
                      <option value="saturday">토요일</option>
                      <option value="sunday">일요일</option>
                    </select>
                  </label>
                  <label>
                    시간
                    <input id="pensionScheduleTime" type="time" step="60">
                  </label>
                </div>
                <label>
                  확인 허용 시간(분)
                  <input id="scheduleWindowMinutes" type="number" min="1" max="360" step="5">
                </label>
                <div class="actions">
                  <button type="button" id="resetScheduleToAnnouncement">발표 시간으로 초기화</button>
                  <button type="button" id="saveSchedule">알림 시간 저장</button>
                </div>
              </div>
            </div>
          </details>

          <div id="status" class="status" role="status" aria-live="polite"></div>
        </div>
      </section>

      <section class="panel" aria-labelledby="output-title">
        <div class="panel-header">
          <h2 id="output-title">생성 결과</h2>
        </div>
        <div class="panel-body">
          <div id="ticketSummary" class="ticket-summary" aria-label="구매번호 목록"></div>
          <details class="yaml-details">
            <summary>원본 YAML 보기</summary>
            <pre id="yamlOutput" class="yaml"></pre>
          </details>
        </div>
      </section>
    </div>
  </main>

  <script>
    const ticketsRawUrl = "https://raw.githubusercontent.com/asher8554/DHLottery/main/data/tickets.yml";
    const accountRawUrl = "https://raw.githubusercontent.com/asher8554/DHLottery/main/data/account.yml";
    const notificationSettingsRawUrl = "https://raw.githubusercontent.com/asher8554/DHLottery/main/data/notification-settings.yml";
    const checkWorkflowDispatchUrl = "https://api.github.com/repos/asher8554/DHLottery/actions/workflows/check-results.yml/dispatches";
    const updateNotificationWorkflowDispatchUrl = "https://api.github.com/repos/asher8554/DHLottery/actions/workflows/update-notification-settings.yml/dispatches";
    const balanceAlertThreshold = 50000;
    const tokenStorageKey = "dhlottery.githubToken";
    const themeStorageKey = "dhlottery.theme";
    const announcementSchedule = {
      timezone: "Asia/Seoul",
      windowMinutes: 30,
      lotto: { enabled: true, day: "saturday", time: "20:35" },
      pension: { enabled: true, day: "thursday", time: "19:05" },
    };

    const themeToggle = document.querySelector("#themeToggle");
    const balanceAmount = document.querySelector("#balanceAmount");
    const balanceStatus = document.querySelector("#balanceStatus");
    const balanceUpdatedAt = document.querySelector("#balanceUpdatedAt");
    const notificationScheduleSummary = document.querySelector("#notificationScheduleSummary");
    const loadedAt = document.querySelector("#loadedAt");
    const ticketCount = document.querySelector("#ticketCount");
    const ticketSummary = document.querySelector("#ticketSummary");
    const yamlOutput = document.querySelector("#yamlOutput");
    const statusEl = document.querySelector("#status");
    const reloadTickets = document.querySelector("#reloadTickets");
    const copyYaml = document.querySelector("#copyYaml");
    const downloadYaml = document.querySelector("#downloadYaml");
    const githubToken = document.querySelector("#githubToken");
    const rememberToken = document.querySelector("#rememberToken");
    const forceNotify = document.querySelector("#forceNotify");
    const lottoScheduleEnabled = document.querySelector("#lottoScheduleEnabled");
    const lottoScheduleDay = document.querySelector("#lottoScheduleDay");
    const lottoScheduleTime = document.querySelector("#lottoScheduleTime");
    const pensionScheduleEnabled = document.querySelector("#pensionScheduleEnabled");
    const pensionScheduleDay = document.querySelector("#pensionScheduleDay");
    const pensionScheduleTime = document.querySelector("#pensionScheduleTime");
    const scheduleWindowMinutes = document.querySelector("#scheduleWindowMinutes");
    const resetScheduleToAnnouncement = document.querySelector("#resetScheduleToAnnouncement");
    const saveSchedule = document.querySelector("#saveSchedule");
    const runCheck = document.querySelector("#runCheck");
    const clearToken = document.querySelector("#clearToken");

    let currentYaml = "";
    let currentTickets = { lotto: [], pension: [] };

    function setStatus(message, tone) {
      statusEl.textContent = message;
      statusEl.className = `status ${tone || ""}`.trim();
    }

    function setButtonsEnabled(enabled) {
      copyYaml.disabled = !enabled;
      downloadYaml.disabled = !enabled;
      runCheck.disabled = !enabled;
    }

    function parseNumberList(value) {
      return (value.match(/\d+/g) || []).map((number) => Number(number));
    }

    function parseAccountYaml(yaml) {
      const amountMatch = yaml.match(/^\s*amount:\s*(\d+)\s*$/m);
      const updatedAtMatch = yaml.match(/^\s*updated_at:\s*["']?(.+?)["']?\s*$/m);
      return {
        amount: amountMatch ? Number(amountMatch[1]) : null,
        updatedAt: updatedAtMatch ? updatedAtMatch[1] : "",
      };
    }

    function formatKrw(amount) {
      return `${new Intl.NumberFormat("ko-KR").format(amount)}원`;
    }

    function formatDateTime(value) {
      if (!value) {
        return "-";
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return date.toLocaleString("ko-KR");
    }

    function defaultNotificationSettings() {
      return {
        timezone: "Asia/Seoul",
        windowMinutes: 30,
        lotto: { enabled: true, day: "saturday", time: "21:45" },
        pension: { enabled: true, day: "thursday", time: "20:10" },
      };
    }

    function cleanYamlValue(value) {
      return String(value || "").trim().replace(/^["']|["']$/g, "");
    }

    function parseNotificationSettingsYaml(yaml) {
      const settings = defaultNotificationSettings();
      let section = "";

      for (const line of yaml.split(/\r?\n/)) {
        const trimmed = line.trim();
        if (!trimmed || trimmed === "notification_schedule:") {
          continue;
        }

        const topMatch = line.match(/^  (lotto|pension):\s*$/);
        if (topMatch) {
          section = topMatch[1];
          continue;
        }

        const timezoneMatch = line.match(/^  timezone:\s*(.+?)\s*$/);
        if (timezoneMatch) {
          settings.timezone = cleanYamlValue(timezoneMatch[1]) || settings.timezone;
          continue;
        }

        const windowMatch = line.match(/^  window_minutes:\s*(\d+)\s*$/);
        if (windowMatch) {
          settings.windowMinutes = Number(windowMatch[1]);
          continue;
        }

        if (!section) {
          continue;
        }

        const enabledMatch = line.match(/^    enabled:\s*(true|false)\s*$/i);
        if (enabledMatch) {
          settings[section].enabled = enabledMatch[1].toLowerCase() === "true";
          continue;
        }

        const dayMatch = line.match(/^    day:\s*(.+?)\s*$/);
        if (dayMatch) {
          settings[section].day = cleanYamlValue(dayMatch[1]);
          continue;
        }

        const timeMatch = line.match(/^    time:\s*(.+?)\s*$/);
        if (timeMatch) {
          settings[section].time = cleanYamlValue(timeMatch[1]);
        }
      }

      return settings;
    }

    function scheduleSummary(settings) {
      const dayLabels = {
        monday: "월",
        tuesday: "화",
        wednesday: "수",
        thursday: "목",
        friday: "금",
        saturday: "토",
        sunday: "일",
      };
      const parts = [];
      if (settings.lotto.enabled) {
        parts.push(`로또 ${dayLabels[settings.lotto.day] || settings.lotto.day} ${settings.lotto.time}`);
      }
      if (settings.pension.enabled) {
        parts.push(`연금 ${dayLabels[settings.pension.day] || settings.pension.day} ${settings.pension.time}`);
      }
      return parts.length ? `${parts.join(", ")} · ${settings.windowMinutes}분` : "꺼짐";
    }

    function applyNotificationSettingsForm(settings) {
      lottoScheduleEnabled.checked = settings.lotto.enabled;
      lottoScheduleDay.value = settings.lotto.day;
      lottoScheduleTime.value = settings.lotto.time;
      pensionScheduleEnabled.checked = settings.pension.enabled;
      pensionScheduleDay.value = settings.pension.day;
      pensionScheduleTime.value = settings.pension.time;
      scheduleWindowMinutes.value = settings.windowMinutes;
    }

    function renderNotificationSettings(settings) {
      applyNotificationSettingsForm(settings);
      notificationScheduleSummary.textContent = scheduleSummary(settings);
    }

    function readNotificationSettingsForm() {
      const windowMinutes = Number(scheduleWindowMinutes.value);
      if (!Number.isInteger(windowMinutes) || windowMinutes < 1 || windowMinutes > 360) {
        throw new Error("확인 허용 시간은 1부터 360 사이여야 합니다.");
      }
      if (!lottoScheduleTime.value || !pensionScheduleTime.value) {
        throw new Error("알림 시간을 입력하세요.");
      }
      return {
        timezone: "Asia/Seoul",
        windowMinutes,
        lotto: {
          enabled: lottoScheduleEnabled.checked,
          day: lottoScheduleDay.value,
          time: lottoScheduleTime.value,
        },
        pension: {
          enabled: pensionScheduleEnabled.checked,
          day: pensionScheduleDay.value,
          time: pensionScheduleTime.value,
        },
      };
    }

    function resetScheduleFormToAnnouncement() {
      applyNotificationSettingsForm(announcementSchedule);
      setStatus("발표 시간으로 입력했습니다. 실제 반영하려면 알림 시간 저장을 누르세요.", "");
    }

    function parseTicketsYaml(yaml) {
      const lotto = [];
      const pension = [];
      let section = "";
      let current = null;

      for (const line of yaml.split(/\r?\n/)) {
        const trimmed = line.trim();
        if (!trimmed || trimmed === "tickets:") {
          continue;
        }
        if (trimmed === "lotto:") {
          section = "lotto";
          current = null;
          continue;
        }
        if (trimmed === "pension:") {
          section = "pension";
          current = null;
          continue;
        }

        const labelMatch = trimmed.match(/^- label:\s*["']?(.+?)["']?\s*$/);
        if (labelMatch && section) {
          current = { label: labelMatch[1] };
          if (section === "lotto") {
            current.numbers = [];
            lotto.push(current);
          } else {
            pension.push(current);
          }
          continue;
        }

        if (!current) {
          continue;
        }

        const roundMatch = trimmed.match(/^round:\s*(\d+)/);
        if (roundMatch) {
          current.round = Number(roundMatch[1]);
          continue;
        }

        const numbersInlineMatch = trimmed.match(/^numbers:\s*\[(.*?)\]/);
        if (numbersInlineMatch) {
          current.numbers = parseNumberList(numbersInlineMatch[1]).slice(0, 6);
          continue;
        }

        if (section === "lotto" && /^-\s*\d+/.test(trimmed)) {
          current.numbers.push(Number(trimmed.replace(/^-\s*/, "")));
          current.numbers = current.numbers.slice(0, 6);
          continue;
        }

        const groupMatch = trimmed.match(/^group:\s*(\d+)/);
        if (groupMatch) {
          current.group = Number(groupMatch[1]);
          continue;
        }

        const pensionNumberMatch = trimmed.match(/^number:\s*["']?(\d{6})["']?/);
        if (pensionNumberMatch) {
          current.number = pensionNumberMatch[1];
        }
      }

      return {
        lotto: lotto.filter((ticket) => ticket.round && ticket.numbers.length === 6),
        pension: pension.filter((ticket) => ticket.round && ticket.group && /^\d{6}$/.test(ticket.number || "")),
      };
    }

    function slotFromLabel(label, fallback) {
      const match = String(label || "").match(/회\s+([A-Z0-9]+)$/);
      return match ? match[1] : String(fallback);
    }

    function appendTicketRow(slotText, numberText) {
      const row = document.createElement("div");
      row.className = "ticket-row";

      const slot = document.createElement("span");
      slot.className = "ticket-slot";
      slot.textContent = slotText;

      const numbers = document.createElement("span");
      numbers.textContent = numberText;

      row.appendChild(slot);
      row.appendChild(numbers);
      ticketSummary.appendChild(row);
    }

    function renderTickets(tickets) {
      ticketSummary.innerHTML = "";
      tickets.lotto.forEach((ticket, index) => {
        appendTicketRow(`로또 ${slotFromLabel(ticket.label, index + 1)}`, ticket.numbers.join("  "));
      });
      tickets.pension.forEach((ticket, index) => {
        const slot = slotFromLabel(ticket.label, index + 1);
        appendTicketRow(`연금 ${slot}`, `${ticket.round}회 ${ticket.group}조 ${ticket.number}`);
      });
    }

    function renderEmpty(message) {
      currentYaml = "";
      currentTickets = { lotto: [], pension: [] };
      yamlOutput.textContent = "";
      ticketSummary.innerHTML = "";
      ticketCount.textContent = "0개";
      setButtonsEnabled(false);
      setStatus(message, "");
    }

    async function loadTickets() {
      reloadTickets.disabled = true;
      setStatus("저장된 구매번호를 불러오는 중입니다.", "");
      try {
        const response = await fetch(`${ticketsRawUrl}?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }

        const yaml = await response.text();
        loadedAt.textContent = new Date().toLocaleString("ko-KR");
        if (!yaml.trim()) {
          renderEmpty("저장된 구매번호가 없습니다.");
          return;
        }

        const tickets = parseTicketsYaml(yaml);
        const totalCount = tickets.lotto.length + tickets.pension.length;
        currentYaml = yaml.trimEnd() + "\n";
        currentTickets = tickets;
        yamlOutput.textContent = currentYaml;
        ticketCount.textContent = `로또 ${tickets.lotto.length}개, 연금복권 ${tickets.pension.length}개`;
        renderTickets(tickets);
        setButtonsEnabled(totalCount > 0);
        setStatus(totalCount > 0 ? `${totalCount}개 구매번호를 불러왔습니다.` : "구매번호 형식을 확인하지 못했습니다.", totalCount > 0 ? "good" : "bad");
      } catch (error) {
        renderEmpty("구매번호를 불러오지 못했습니다.");
        setStatus(`구매번호 로드 실패. ${error.message}`, "bad");
      } finally {
        reloadTickets.disabled = false;
      }
    }

    async function loadAccount() {
      try {
        const response = await fetch(`${accountRawUrl}?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }

        const account = parseAccountYaml(await response.text());
        if (account.amount === null) {
          throw new Error("예치금 형식을 확인하지 못했습니다.");
        }
        const isLowBalance = account.amount <= balanceAlertThreshold;
        balanceAmount.textContent = formatKrw(account.amount);
        balanceStatus.textContent = isLowBalance ? "충전 필요" : "정상";
        balanceStatus.style.color = isLowBalance ? "var(--bad)" : "var(--good)";
        balanceUpdatedAt.textContent = formatDateTime(account.updatedAt);
      } catch {
        balanceAmount.textContent = "동기화 전";
        balanceStatus.textContent = "-";
        balanceStatus.style.color = "";
        balanceUpdatedAt.textContent = "-";
      }
    }

    async function loadNotificationSettings() {
      try {
        const response = await fetch(`${notificationSettingsRawUrl}?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }
        renderNotificationSettings(parseNotificationSettingsYaml(await response.text()));
      } catch {
        renderNotificationSettings(defaultNotificationSettings());
      }
    }

    async function loadDashboard() {
      await Promise.all([loadTickets(), loadAccount(), loadNotificationSettings()]);
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const helper = document.createElement("textarea");
      helper.value = text;
      helper.setAttribute("readonly", "");
      helper.style.position = "fixed";
      helper.style.opacity = "0";
      document.body.appendChild(helper);
      helper.select();
      document.execCommand("copy");
      helper.remove();
    }

    async function handleCopy() {
      if (!currentYaml.trim()) {
        return;
      }
      try {
        await copyText(currentYaml);
        setStatus("YAML을 복사했습니다.", "good");
      } catch {
        setStatus("복사에 실패했습니다.", "bad");
      }
    }

    function handleDownload() {
      if (!currentYaml.trim()) {
        return;
      }
      const blob = new Blob([currentYaml], { type: "text/yaml;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "tickets.yml";
      document.body.appendChild(link);
      link.click();
      URL.revokeObjectURL(link.href);
      link.remove();
      setStatus("tickets.yml 파일을 만들었습니다.", "good");
    }

    function loadSavedToken() {
      try {
        const savedToken = localStorage.getItem(tokenStorageKey);
        if (savedToken) {
          githubToken.value = savedToken;
          rememberToken.checked = true;
        }
      } catch {
        clearToken.disabled = true;
      }
    }

    function saveTokenPreference() {
      try {
        if (rememberToken.checked && githubToken.value.trim()) {
          localStorage.setItem(tokenStorageKey, githubToken.value.trim());
        } else {
          localStorage.removeItem(tokenStorageKey);
        }
      } catch {
        setStatus("브라우저 저장소에 토큰을 저장하지 못했습니다.", "bad");
      }
    }

    function clearSavedToken() {
      try {
        localStorage.removeItem(tokenStorageKey);
      } catch {
        setStatus("브라우저 저장소에 접근하지 못했습니다.", "bad");
        return;
      }
      githubToken.value = "";
      rememberToken.checked = false;
      setStatus("저장된 토큰을 지웠습니다.", "good");
    }

    async function handleSaveSchedule() {
      const token = githubToken.value.trim();
      if (!token) {
        setStatus("GitHub token을 입력하세요.", "bad");
        return;
      }

      let settings;
      try {
        settings = readNotificationSettingsForm();
      } catch (error) {
        setStatus(error.message, "bad");
        return;
      }

      saveTokenPreference();
      saveSchedule.disabled = true;
      setStatus("알림 시간 저장 워크플로를 실행하는 중입니다.", "");
      try {
        const response = await fetch(updateNotificationWorkflowDispatchUrl, {
          method: "POST",
          headers: {
            "Accept": "application/vnd.github+json",
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json",
            "X-GitHub-Api-Version": "2022-11-28",
          },
          body: JSON.stringify({
            ref: "main",
            inputs: {
              lotto_enabled: settings.lotto.enabled ? "true" : "false",
              lotto_day: settings.lotto.day,
              lotto_time: settings.lotto.time,
              pension_enabled: settings.pension.enabled ? "true" : "false",
              pension_day: settings.pension.day,
              pension_time: settings.pension.time,
              window_minutes: String(settings.windowMinutes),
            },
          }),
        });

        if (response.ok) {
          renderNotificationSettings(settings);
          setStatus("알림 시간 저장 워크플로를 실행했습니다. 잠시 후 새로고침하면 저장된 설정이 반영됩니다.", "good");
          return;
        }

        const detail = await response.text();
        const hint = response.status === 403 ? " Actions: Read and write 권한을 확인하세요." : "";
        setStatus(`알림 시간 저장 실패. ${response.status} ${detail}${hint}`, "bad");
      } catch (error) {
        setStatus(`알림 시간 저장 실패. ${error.message}`, "bad");
      } finally {
        saveSchedule.disabled = false;
      }
    }

    async function handleRunCheck() {
      const token = githubToken.value.trim();
      if (!token) {
        setStatus("GitHub token을 입력하세요.", "bad");
        return;
      }
      saveTokenPreference();
      runCheck.disabled = true;
      setStatus("GitHub Actions 실행을 요청하는 중입니다.", "");
      try {
        const response = await fetch(checkWorkflowDispatchUrl, {
          method: "POST",
          headers: {
            "Accept": "application/vnd.github+json",
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json",
            "X-GitHub-Api-Version": "2022-11-28",
          },
          body: JSON.stringify({
            ref: "main",
            inputs: {
              force_notify: forceNotify.checked ? "true" : "false",
            },
          }),
        });

        if (response.ok) {
          setStatus("당첨 검사 워크플로를 실행했습니다.", "good");
          return;
        }

        const detail = await response.text();
        setStatus(`GitHub 요청 실패. ${response.status} ${detail}`, "bad");
      } catch (error) {
        setStatus(`GitHub 요청 실패. ${error.message}`, "bad");
      } finally {
        runCheck.disabled = currentTickets.lotto.length + currentTickets.pension.length === 0;
      }
    }

    function applyTheme(theme) {
      const useDark = theme === "dark";
      document.body.classList.toggle("theme-dark", useDark);
      themeToggle.setAttribute("aria-pressed", String(useDark));
      themeToggle.textContent = useDark ? "라이트모드" : "다크모드";
    }

    function loadTheme() {
      let savedTheme = "";
      try {
        savedTheme = localStorage.getItem(themeStorageKey) || "";
      } catch {
        savedTheme = "";
      }
      if (savedTheme) {
        applyTheme(savedTheme);
        return;
      }
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      applyTheme(prefersDark ? "dark" : "light");
    }

    function toggleTheme() {
      const nextTheme = document.body.classList.contains("theme-dark") ? "light" : "dark";
      applyTheme(nextTheme);
      try {
        localStorage.setItem(themeStorageKey, nextTheme);
      } catch {
        setStatus("브라우저 저장소에 화면 모드를 저장하지 못했습니다.", "bad");
      }
    }

    reloadTickets.addEventListener("click", loadDashboard);
    copyYaml.addEventListener("click", handleCopy);
    downloadYaml.addEventListener("click", handleDownload);
    resetScheduleToAnnouncement.addEventListener("click", resetScheduleFormToAnnouncement);
    saveSchedule.addEventListener("click", handleSaveSchedule);
    runCheck.addEventListener("click", handleRunCheck);
    clearToken.addEventListener("click", clearSavedToken);
    rememberToken.addEventListener("change", saveTokenPreference);
    githubToken.addEventListener("input", () => {
      if (rememberToken.checked) {
        saveTokenPreference();
      }
    });
    themeToggle.addEventListener("click", toggleTheme);

    loadTheme();
    loadSavedToken();
    renderEmpty("저장된 구매번호를 불러오는 중입니다.");
    loadDashboard();
  </script>
</body>
</html>
