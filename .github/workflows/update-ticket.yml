name: Update ticket and check results

on:
  workflow_dispatch:
    inputs:
      ticket_yaml:
        description: "Complete data/tickets.yml content."
        required: true
        type: string
      notify:
        description: "Send Kakao notification after checking results."
        required: true
        default: true
        type: boolean
      force_notify:
        description: "Send Kakao notification even if the same result was already sent."
        required: false
        default: false
        type: boolean
      notify_pending:
        description: "Send Kakao notification when lottery results are not ready yet."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: dhlottery-update-ticket
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
      KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
      STATE_HASH_SALT: ${{ secrets.STATE_HASH_SALT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Write ticket file
        env:
          TICKET_YAML_INPUT: ${{ inputs.ticket_yaml }}
        shell: bash
        run: |
          mkdir -p data
          printf '%s\n' "$TICKET_YAML_INPUT" > data/tickets.yml

      - name: Validate ticket file
        run: python -m dhlottery_checker check --tickets data/tickets.yml --dry-run --no-state

      - name: Commit ticket file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tickets.yml
          if git diff --cached --quiet; then
            echo "No ticket changes to commit."
          else
            git commit -m "구매번호 갱신"
            git push
          fi

      - name: Restore sent state
        if: ${{ inputs.notify == true || inputs.notify == 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: dhlottery-state-${{ github.run_id }}
          restore-keys: |
            dhlottery-state-

      - name: Prepare state directory
        if: ${{ inputs.notify == true || inputs.notify == 'true' }}
        run: mkdir -p .state

      - name: Validate notification secrets
        if: ${{ inputs.notify == true || inputs.notify == 'true' }}
        shell: bash
        run: |
          missing=0
          for name in KAKAO_REST_API_KEY KAKAO_REFRESH_TOKEN STATE_HASH_SALT; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing repository secret::$name is required."
              missing=1
            fi
          done
          exit "$missing"

      - name: Check results and send Kakao message
        if: ${{ inputs.notify == true || inputs.notify == 'true' }}
        env:
          FORCE_NOTIFY: ${{ inputs.force_notify }}
          NOTIFY_PENDING: ${{ inputs.notify_pending || 'false' }}
        shell: bash
        run: |
          args=(python -m dhlottery_checker check --tickets data/tickets.yml --notify --state .state/sent-results.json --history data/result-history.yml)
          if [ "$FORCE_NOTIFY" = "true" ]; then
            args+=(--force-notify)
          fi
          if [ "$NOTIFY_PENDING" = "true" ]; then
            args+=(--notify-pending)
          fi
          args+=(--status-json .state/check-status.json)
          "${args[@]}"

      - name: Commit result history and completed ticket cleanup
        if: ${{ inputs.notify == true || inputs.notify == 'true' }}
        shell: bash
        run: |
          python -m dhlottery_checker prune-sent-tickets --tickets data/tickets.yml --status-json .state/check-status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tickets.yml data/result-history.yml
          if git diff --cached --quiet; then
            echo "No result history or completed ticket entries to commit."
          else
            git commit -m "당첨결과 이력 갱신"
            git pull --rebase
            git push
          fi

      - name: Save sent state
        if: ${{ always() && (inputs.notify == true || inputs.notify == 'true') }}
        uses: actions/cache/save@v4
        with:
          path: .state
          key: dhlottery-state-${{ github.run_id }}
