name: Check lottery results

on:
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Send Kakao notification even if the same result was already sent."
        required: false
        default: false
        type: boolean
      notify_pending:
        description: "Send Kakao notification when lottery results are not ready yet."
        required: false
        default: false
        type: boolean
  schedule:
    # Poll every 10 minutes. The actual Kakao send time is controlled by data/notification-settings.yml.
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: dhlottery-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
      KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
      STATE_HASH_SALT: ${{ secrets.STATE_HASH_SALT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check ticket file
        id: ticket-file
        shell: bash
        run: |
          if [ -s data/tickets.yml ]; then
            echo "has_tickets=true" >> "$GITHUB_OUTPUT"
          else
            echo "No ticket file. Nothing to check."
            echo "has_tickets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check notification schedule
        id: notification_schedule
        if: ${{ steps.ticket-file.outputs.has_tickets == 'true' }}
        env:
          FORCE_NOTIFY: ${{ inputs.force_notify || 'false' }}
        shell: bash
        run: |
          args=(python3 -m dhlottery_checker.schedule_config --settings data/notification-settings.yml --event-name "$GITHUB_EVENT_NAME" --github-output "$GITHUB_OUTPUT")
          if [ "$FORCE_NOTIFY" = "true" ]; then
            args+=(--force-notify)
          fi
          "${args[@]}"

      - name: Set up Python
        if: ${{ steps.ticket-file.outputs.has_tickets == 'true' && steps.notification_schedule.outputs.should_run == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: ${{ steps.ticket-file.outputs.has_tickets == 'true' && steps.notification_schedule.outputs.should_run == 'true' }}
        run: python -m pip install -r requirements.txt

      - name: Restore sent state
        if: ${{ steps.ticket-file.outputs.has_tickets == 'true' && steps.notification_schedule.outputs.should_run == 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: dhlottery-state-${{ github.run_id }}
          restore-keys: |
            dhlottery-state-

      - name: Prepare state directory
        if: ${{ steps.ticket-file.outputs.has_tickets == 'true' && steps.notification_schedule.outputs.should_run == 'true' }}
        run: mkdir -p .state

      - name: Validate required secrets
        if: ${{ steps.ticket-file.outputs.has_tickets == 'true' && steps.notification_schedule.outputs.should_run == 'true' }}
        shell: bash
        run: |
          missing=0
          for name in KAKAO_REST_API_KEY KAKAO_REFRESH_TOKEN STATE_HASH_SALT; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing repository secret::$name is required."
              missing=1
            fi
          done
          exit "$missing"

      - name: Check results and send Kakao message
        id: check-results
        if: ${{ steps.ticket-file.outputs.has_tickets == 'true' && steps.notification_schedule.outputs.should_run == 'true' }}
        env:
          FORCE_NOTIFY: ${{ inputs.force_notify || 'false' }}
          INPUT_NOTIFY_PENDING: ${{ inputs.notify_pending || 'false' }}
          SCHEDULE_NOTIFY_PENDING: ${{ steps.notification_schedule.outputs.notify_pending || 'false' }}
          DUE_GAMES: ${{ steps.notification_schedule.outputs.due_games || 'all' }}
        shell: bash
        run: |
          game_arg="all"
          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            case "$DUE_GAMES" in
              lotto) game_arg="lotto" ;;
              pension) game_arg="pension" ;;
            esac
          fi
          args=(python -m dhlottery_checker check --tickets data/tickets.yml --game "$game_arg" --notify --state .state/sent-results.json --status-json .state/check-status.json --history data/result-history.yml)
          if [ "$FORCE_NOTIFY" = "true" ]; then
            args+=(--force-notify)
          fi
          notify_pending="$SCHEDULE_NOTIFY_PENDING"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            notify_pending="$INPUT_NOTIFY_PENDING"
          fi
          if [ "$notify_pending" = "true" ]; then
            args+=(--notify-pending)
          fi
          "${args[@]}"

      - name: Print check status
        if: ${{ always() && steps.ticket-file.outputs.has_tickets == 'true' && steps.notification_schedule.outputs.should_run == 'true' }}
        shell: bash
        run: |
          if [ -s .state/check-status.json ]; then
            cat .state/check-status.json
          else
            echo "No check status file was created."
          fi

      - name: Commit result history and completed ticket cleanup
        if: ${{ always() && steps.ticket-file.outputs.has_tickets == 'true' && steps.notification_schedule.outputs.should_run == 'true' }}
        shell: bash
        run: |
          if [ "${{ steps.check-results.outcome }}" = "success" ]; then
            python -m dhlottery_checker prune-sent-tickets --tickets data/tickets.yml --status-json .state/check-status.json --history data/result-history.yml
            git add data/tickets.yml data/result-history.yml
          else
            git add data/result-history.yml
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No result history or completed ticket entries to commit."
          else
            git commit -m "당첨결과 이력 갱신"
            git pull --rebase
            git push
          fi

      - name: Save sent state
        if: ${{ always() && steps.ticket-file.outputs.has_tickets == 'true' && steps.notification_schedule.outputs.should_run == 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .state
          key: dhlottery-state-${{ github.run_id }}
