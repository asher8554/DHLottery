name: Check lottery results

on:
  workflow_dispatch:
  schedule:
    # KST Thursday 19:15 for Pension 720+ result checks.
    - cron: "15 10 * * 4"
    # KST Saturday 21:10 for Lotto 6/45 result checks.
    - cron: "10 12 * * 6"

permissions:
  contents: read

concurrency:
  group: dhlottery-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TICKETS_YAML: ${{ secrets.TICKETS_YAML }}
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
      KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
      STATE_HASH_SALT: ${{ secrets.STATE_HASH_SALT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Restore sent state
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: dhlottery-state-${{ github.run_id }}
          restore-keys: |
            dhlottery-state-

      - name: Prepare state directory
        run: mkdir -p .state

      - name: Check results and send Kakao message
        run: python -m dhlottery_checker check --notify --state .state/sent-results.json

      - name: Save sent state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: dhlottery-state-${{ github.run_id }}
