name: Check lottery results

on:
  workflow_dispatch:
  schedule:
    # KST Thursday 20:10 for Pension 720+ result checks after site reflection delay.
    - cron: "10 11 * * 4"
    # KST Saturday 21:45 for Lotto 6/45 result checks after site reflection delay.
    - cron: "45 12 * * 6"

permissions:
  contents: write

concurrency:
  group: dhlottery-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
      KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
      STATE_HASH_SALT: ${{ secrets.STATE_HASH_SALT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check ticket file
        id: ticket-file
        shell: bash
        run: |
          if [ -s data/tickets.yml ]; then
            echo "has_tickets=true" >> "$GITHUB_OUTPUT"
          else
            echo "No ticket file. Nothing to check."
            echo "has_tickets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: ${{ steps.ticket-file.outputs.has_tickets == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: ${{ steps.ticket-file.outputs.has_tickets == 'true' }}
        run: python -m pip install -r requirements.txt

      - name: Restore sent state
        if: ${{ steps.ticket-file.outputs.has_tickets == 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: dhlottery-state-${{ github.run_id }}
          restore-keys: |
            dhlottery-state-

      - name: Prepare state directory
        if: ${{ steps.ticket-file.outputs.has_tickets == 'true' }}
        run: mkdir -p .state

      - name: Validate required secrets
        if: ${{ steps.ticket-file.outputs.has_tickets == 'true' }}
        shell: bash
        run: |
          missing=0
          for name in KAKAO_REST_API_KEY KAKAO_REFRESH_TOKEN STATE_HASH_SALT; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing repository secret::$name is required."
              missing=1
            fi
          done
          exit "$missing"

      - name: Check results and send Kakao message
        if: ${{ steps.ticket-file.outputs.has_tickets == 'true' }}
        run: python -m dhlottery_checker check --tickets data/tickets.yml --notify --state .state/sent-results.json --status-json .state/check-status.json

      - name: Clear ticket file after completed notification
        if: ${{ steps.ticket-file.outputs.has_tickets == 'true' }}
        shell: bash
        run: |
          should_clear="$(python - <<'PY'
          import json
          from pathlib import Path

          path = Path(".state/check-status.json")
          if not path.exists():
              print("false")
          else:
              status = json.loads(path.read_text(encoding="utf-8"))
              print("true" if status.get("clear_tickets") else "false")
          PY
          )"
          if [ "$should_clear" != "true" ]; then
            echo "Keeping ticket file for a later result check."
            exit 0
          fi
          : > data/tickets.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tickets.yml
          if git diff --cached --quiet; then
            echo "Ticket file is already clear."
          else
            git commit -m "구매번호 초기화"
            git pull --rebase
            git push
          fi

      - name: Save sent state
        if: ${{ always() && steps.ticket-file.outputs.has_tickets == 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .state
          key: dhlottery-state-${{ github.run_id }}
